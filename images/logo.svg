<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a04a"/>
      <stop offset="30%" style="stop-color:#f0c96e"/>
      <stop offset="50%" style="stop-color:#d4a04a"/>
      <stop offset="70%" style="stop-color:#b8872e"/>
      <stop offset="100%" style="stop-color:#d4a04a"/>
    </linearGradient>
    <linearGradient id="goldRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8943c"/>
      <stop offset="25%" style="stop-color:#f0d080"/>
      <stop offset="50%" style="stop-color:#d4a04a"/>
      <stop offset="75%" style="stop-color:#b8872e"/>
      <stop offset="100%" style="stop-color:#e0b860"/>
    </linearGradient>
  </defs>
  <!-- Dark background circle -->
  <circle cx="100" cy="100" r="100" fill="#111111"/>
  <!-- Gold ring -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="url(#goldRing)" stroke-width="4"/>
  <!-- G letter -->
  <text x="82" y="112" font-family="Georgia, 'Times New Roman', serif" font-size="60" font-weight="normal" font-style="italic" fill="url(#gold)" text-anchor="middle">G</text>
  <!-- B letter overlapping -->
  <text x="118" y="107" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="normal" fill="url(#gold)" text-anchor="middle">B</text>
  <!-- Computer Services text inside the circle -->
  <text x="100" y="150" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="url(#gold)" text-anchor="middle" letter-spacing="1">Computer Services</text>
</svg>
